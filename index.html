<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #2c3e50;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px auto;
            display: block;
            background-color: #ddd;
        }
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 60px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .section {
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>欢迎来到我的个人主页</h1>
            <div class="profile-avatar">刘</div>
        </header>
        
        <section class="section">
            <h2>关于我</h2>
            <p>这里是你的个人介绍...</p>
        </section>
        
        <section class="section">
            <h2>技能</h2>
            <ul>
                <li>编程语言</li>
                <li>Web开发</li>
                <li>数据分析</li>
            </ul>
        </section>
        
        <section class="section">
            <h2>项目</h2>
            <p>这里展示你的项目...</p>
        </section>
        
        <section class="section">
            <h2>联系方式</h2>
            <p>Email: your-email@example.com</p>
            <p>GitHub: <a href="https://github.com/River-New">River-New</a></p>
        </section>
        
        <footer>
            <p>&copy; 2026 我的个人主页. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
